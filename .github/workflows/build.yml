name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        uses: gautamkrishnar/android-licenses-action@v1
        with:
          android_sdk_home: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Purge Cache and Build APK
        run: |
          # 1. Глобальная зачистка кэша Flet во всей системе Linux
          rm -rf ~/.flet
          rm -rf ~/.cache/flet
          
          # 2. Переход в папку проекта и локальная зачистка
          cd PythonProject
          cp "main.py дневник" main.py
          rm -rf .flet
          rm -rf build
          
          # 3. Чистый запуск сборки с нуля
          flet build apk
