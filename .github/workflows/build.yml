name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        uses: gautamkrishnar/android-licenses-action@v1
        with:
          android_sdk_home: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Hard Reset Project Structure and Build
        run: |
          # 1. Создаем встроенный чистый шаблон Flet, который не требует скачивания из сети
          flet create app_clean
          
          # 2. Заменяем дефолтный main.py на твой рабочий файл дневника
          cp "PythonProject/main.py дневник" app_clean/main.py
          
          # 3. Переходим в созданную рабочую папку и запускаем компиляцию
          cd app_clean
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: school-app-release
          path: app_clean/build/apk/*.apk
