name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        uses: gautamkrishnar/android-licenses-action@v1
        with:
          android_sdk_home: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Download Flet Template and Build APK
        run: |
          # 1. Создаем системную папку кэша, где Flet ожидает увидеть шаблон
          mkdir -p ~/.cache/flet/apps
          
          # 2. Скачиваем официальный шаблон сборки напрямую через curl
          curl -L -o flet-app-template.zip https://github.com/flet-dev/flet-app-template/archive/refs/heads/main.zip
          
          # 3. Переносим скачанный архив в кэш под именем, которое ищет сборщик
          mv flet-app-template.zip ~/.cache/flet/apps/flet-app-template-main.zip
          
          # 4. Создаем чистую структуру проекта
          flet create app_clean
          
          # 5. Находим твой файл дневника и заменяем им шаблонный код
          find . -name "*дневник*" -exec cp {} app_clean/main.py \;
          
          # 6. Собираем приложение
          cd app_clean
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: school-app-release
          path: app_clean/build/apk/*.apk
