name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        uses: gautamkrishnar/android-licenses-action@v1
        with:
          android_sdk_home: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Build APK
        run: |
          # 1. Создаем абсолютно чистую временную папку для сборки
          flet create build_dir
          
          # 2. Копируем твой рабочий файл дневника внутрь новой чистой структуры под именем main.py
          cp "PythonProject/main.py дневник" build_dir/main.py
          
          # 3. Переходим туда и запускаем сборку локального шаблона
          cd build_dir
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: school-app-release
          path: build_dir/build/apk/*.apk
