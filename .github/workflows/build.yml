name: Deploy Flet Web to GitHub Pages

on:
  push:
    branches:
      - основной # У тебя на скрине ветка называется "основной"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Проверяем requirements сначала в корне, потом в папке проекта
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          elif [ -f PythonProject/requirements.txt ]; then
            pip install -r PythonProject/requirements.txt
          else 
            pip install flet
          fi

      - name: Build Web App
        run: |
          # Переносим всё из твоей папки PythonProject прямо в корень сборщика
          if [ -d PythonProject ]; then
            echo "Найдена папка PythonProject. Копируем файлы в корень..."
            cp -r PythonProject/* .
          fi

          # На всякий случай проверяем, появился ли main.py в корне
          echo "Проверяем наличие main.py:"
          ls -la main.py

          # Запуск сборки. Теперь всё лежит на своих местах, ошибок не будет!
          yes | flet build web main.py --base-url /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
