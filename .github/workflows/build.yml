name: Build Flet APK

on:
  push:
    branches: [ main ]
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Настраиваем Java (нужна для сборки Android)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 3. Настраиваем Flutter стандартным экшеном
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Готовим структуру папок, чтобы не было русских букв в путях
      - name: Prepare Clean Project Directory
        run: |
          mkdir -p app_clean
          echo '[app]' > app_clean/flet.toml
          echo 'name = "SchoolApp"' >> app_clean/flet.toml
          echo 'path = "main.py"' >> app_clean/flet.toml
          
          # Находим твой файл дневника и переносим его в main.py с импортом
          ORIGINAL_FILE=$(find . -name "*дневник*" -print -quit)
          echo "import flet as ft" > app_clean/main.py
          cat "$ORIGINAL_FILE" >> app_clean/main.py

      # 5. ИСПОЛЬЗУЕМ ОФИЦИАЛЬНЫЙ ЭКШЕН СБОРКИ FLET
      # Он сам знает, как правильно и без интерактивных вопросов скомпилировать проект
      - name: Build Android APK via Flet Action
        uses: flet-dev/flet-build-action@v1
        with:
          target: apk
          project_dir: app_clean

      # 6. Сохраняем готовый файл
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: school-app-release
          path: app_clean/build/apk/*.apk
