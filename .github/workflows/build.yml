name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Download Flet Template and Build APK
        run: |
          # 1. Принимаем лицензии Android
          yes | sdkmanager --licenses || true
          
          # 2. Обманываем кэш шаблонов Flet
          mkdir -p ~/.cache/flet/apps
          curl -L -o flet-app-template.zip https://github.com/flet-dev/flet-app-template/archive/refs/heads/main.zip
          mv flet-app-template.zip ~/.cache/flet/apps/flet-app-template-main.zip
          
          # 3. Создаем чистую структуру проекта
          flet create app_clean
          
          # 4. Находим твой файл дневника в репозитории
          ORIGINAL_FILE=$(find . -name "*дневник*" -print -quit)
          
          # 5. БЕЗОПАСНАЯ СКЛЕЙКА: создаем чистый main.py, пишем туда импорт и добавляем твой код без повреждения отступов
          echo "import flet as ft" > app_clean/main.py
          cat "$ORIGINAL_FILE" >> app_clean/main.py
          
          # 6. Собираем приложение
          cd app_clean
          flet build apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: school-app-release
          path: app_clean/build/apk/*.apk
