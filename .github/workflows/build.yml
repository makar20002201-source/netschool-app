name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        uses: gautamkrishnar/android-licenses-action@v1
        with:
          android_sdk_home: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.27.3

      - name: Prepare Files and Build APK
        run: |
          cd PythonProject
          cp "main.py дневник" main.py
          flet build apk
