name: Deploy Flet Web to GitHub Pages

on:
  push:
    branches:
      - main # Если твоя главная ветка называется master, замени main на master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            pip install flet
          fi

      - name: Build Web App
        run: |
          # Проверяем, где лежит файл. Если он в папке src, собираем прямо оттуда
          if [ -f src/main.py ]; then
            echo "Файл найден в src/main.py, запускаем сборку..."
            yes | flet build web src/main.py --base-url /${{ github.event.repository.name }}/
          elif [ -f src/shool_app.py ]; then
            echo "Файл найден в src/shool_app.py, запускаем сборку..."
            yes | flet build web src/shool_app.py --base-url /${{ github.event.repository.name }}/
          else
            # Если файлов нет в src, ищем любой .py в корне
            TARGET_FILE=$(ls *.py | grep -v "build" | head -n 1)
            yes | flet build web "$TARGET_FILE" --base-url /${{ github.event.repository.name }}/
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
