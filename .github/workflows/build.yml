name: Deploy Flet Web to GitHub Pages

on:
  push:
    branches:
      - main # Если главная ветка называется master, замени main на master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            pip install flet
          fi

      - name: Build Web App
        run: |
          # Вытаскиваем абсолютно все файлы из папки src в корень, чтобы обмануть тупой сборщик Flet
          if [ -d src ]; then
            echo "Копируем файлы из src в корень репозитория..."
            cp -r src/* .
          fi
          
          # Если основного файла main.py всё ещё нет, но есть shool_app.py, переименовываем его в main.py
          if [ ! -f main.py ] && [ -f shool_app.py ]; then
            echo "Переименовываем shool_app.py в main.py для сборки..."
            mv shool_app.py main.py
          fi

          # Теперь для Flet всё выглядит так, будто проект всегда лежал в корне. Собираем!
          yes | flet build web main.py --base-url /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
