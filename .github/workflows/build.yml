name: Build Flet iOS

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Prepare Clean Project Directory
        run: |
          mkdir -p app_clean
          echo '[app]' > app_clean/flet.toml
          echo 'name = "SchoolApp"' >> app_clean/flet.toml
          echo 'path = "main.py"' >> app_clean/flet.toml
          
          # Находим оригинальный файл дневника и копируем его содержимое в main.py
          ORIGINAL_FILE=$(find . -name "*дневник*" -print -quit)
          echo "import flet as ft" > app_clean/main.py
          cat "$ORIGINAL_FILE" >> app_clean/main.py

      - name: Build iOS App Simulator
        run: |
          cd app_clean
          # Собираем чистый билд под симулятор iOS, который не просит платных подписей
          yes | flet build ios-simulator

      - name: Upload iOS Payload
        uses: actions/upload-artifact@v4
        with:
          name: school-app-ios
          # Забираем готовую папку с результатами сборки
          path: app_clean/build/ios-simulator
