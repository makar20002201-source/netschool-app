name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Accept Android Licenses
        uses: gautamkrishnar/android-licenses-action@v1
        with:
          android_sdk_home: ${{ env.ANDROID_HOME }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Hard Reset Project Structure and Build
        run: |
          # 1. Создаем абсолютно чистую, изолированную папку без русских букв в путях
          mkdir app_clean
          
          # 2. Копируем туда твой файл, жестко переименовывая его в правильный main.py
          cp "PythonProject/main.py дневник" app_clean/main.py
          
          # 3. Создаем обязательный файл настроек flet.toml, чтобы сборщик не ругался на структуру
          echo '[app]' > app_clean/flet.toml
          echo 'name = "SchoolApp"' >> app_clean/flet.toml
          echo 'path = "main.py"' >> app_clean/flet.toml
          
          # 4. Переходим в чистую папку и собираем
          cd app_clean
          flet build apk

      - name: Upload APK
        uses: actions/artifacts@v4
        with:
          name: school-app-release
          path: app_clean/build/apk/*.apk
