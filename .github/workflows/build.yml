name: Deploy Flet Web to GitHub Pages

on:
  push:
    branches:
      - main # Если твоя главная ветка называется master, замени main на master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          else 
            pip install flet
          fi

      - name: Build Web App
        run: |
          # Шаг 1: Подстраховка. Если файлы лежат в папке src
          if [ -d src ]; then
            echo "Найдена папка src, готовим файлы..."
            # Если внутри src есть shool_app.py, но нет main.py — делаем копию с нужным именем
            if [ -f src/shool_app.py ] && [ ! -f src/main.py ]; then
              cp src/shool_app.py src/main.py
            fi
            # Копируем всё из src наружу в корень, чтобы подстраховать сборщик
            cp -r src/* .
          fi

          # Шаг 2: Если папки src нет, но в корне лежит shool_app.py — копируем его как main.py
          if [ ! -f main.py ] && [ -f shool_app.py ]; then
            cp shool_app.py main.py
          fi

          # Проверяем, что получилось в консоли для отладки
          echo "Список файлов в корне:"
          ls -la

          # Шаг 3: Запуск сборки. Теперь main.py раскидан везде, ошибка не возникнет
          yes | flet build web main.py --base-url /${{ github.event.repository.name }}/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
